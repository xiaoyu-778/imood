<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iMood - 音乐管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1f1f1f;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --text-muted: #a0a0a0;
      --primary: #a78bfa;
      --primary-dark: #8b5cf6;
      --primary-glow: rgba(167, 139, 250, 0.15);
      --danger: #ef4444;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      transition: opacity 0.2s ease;
    }

    .back-link:hover {
      opacity: 0.8;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .upload-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .form-group input[type="text"] {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-hover);
      color: var(--text);
      font-size: 0.9375rem;
      transition: all 0.2s ease;
    }

    .form-group input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .file-input-wrapper {
      position: relative;
    }

    .file-input {
      display: none;
    }

    .file-input-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.5rem;
      border: 2px dashed var(--border);
      border-radius: 12px;
      background: var(--surface-hover);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .file-input-label:hover {
      border-color: var(--primary);
      background: var(--primary-glow);
    }

    .file-input-label svg {
      width: 24px;
      height: 24px;
      color: var(--text-muted);
    }

    .file-name {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: none;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .music-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .music-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--surface-hover);
      border-radius: 12px;
      transition: background 0.2s ease;
    }

    .music-item:hover {
      background: var(--border);
    }

    .music-item-info {
      flex: 1;
    }

    .music-item-title {
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .music-item-artist {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .music-item-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover {
      background: var(--surface);
      color: var(--text);
    }

    .btn-icon.delete:hover {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    .success-message {
      padding: 1rem;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 12px;
      color: #4ade80;
      margin-bottom: 1rem;
      display: none;
    }

    .error-message {
      padding: 1rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #ef4444;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        返回主页
      </a>
      <h1>🎵 音乐管理</h1>
      <p class="subtitle">上传和管理音乐文件</p>
    </header>

    <div class="success-message" id="successMessage"></div>
    <div class="error-message" id="errorMessage"></div>

    <div class="card">
      <h2>上传音乐</h2>
      <form class="upload-form" id="uploadForm">
        <div class="form-group">
          <label>音乐文件</label>
          <div class="file-input-wrapper">
            <input type="file" id="musicFile" class="file-input" accept="audio/*">
            <label for="musicFile" class="file-input-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span>点击选择音乐文件</span>
            </label>
            <div class="file-name" id="fileName"></div>
          </div>
        </div>

        <div class="form-group">
          <label>歌曲名称</label>
          <input type="text" id="musicTitle" placeholder="输入歌曲名称">
        </div>

        <div class="form-group">
          <label>艺术家</label>
          <input type="text" id="musicArtist" placeholder="输入艺术家名称">
        </div>

        <button type="submit" class="btn btn-primary">上传音乐</button>
      </form>
    </div>

    <div class="card">
      <h2>音乐列表</h2>
      <div class="music-list" id="musicList">
        <div class="empty-state">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const uploadForm = document.getElementById('uploadForm');
    const musicFile = document.getElementById('musicFile');
    const fileName = document.getElementById('fileName');
    const musicTitle = document.getElementById('musicTitle');
    const musicArtist = document.getElementById('musicArtist');
    const musicList = document.getElementById('musicList');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');

    musicFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        fileName.textContent = file.name;
        // Auto-fill title from filename
        const titleWithoutExt = file.name.replace(/\.[^/.]+$/, '');
        if (!musicTitle.value) {
          musicTitle.value = titleWithoutExt;
        }
      }
    });

    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const file = musicFile.files[0];
      if (!file) {
        showError('请选择音乐文件');
        return;
      }

      const formData = new FormData();
      formData.append('music', file);
      formData.append('title', musicTitle.value);
      formData.append('artist', musicArtist.value);

      try {
        console.log('[DEBUG] Uploading file:', file.name, 'Size:', file.size);
        
        const response = await fetch('/api/music/upload', {
          method: 'POST',
          body: formData
        });

        console.log('[DEBUG] Response status:', response.status);
        
        const data = await response.json();
        console.log('[DEBUG] Response data:', data);

        if (response.ok) {
          showSuccess('音乐上传成功！');
          uploadForm.reset();
          fileName.textContent = '';
          loadMusicList();
        } else {
          showError(data.error || '上传失败');
        }
      } catch (error) {
        console.error('[ERROR] Upload error:', error);
        showError('上传失败: ' + error.message);
      }
    });

    async function loadMusicList() {
      try {
        console.log('[DEBUG] Loading music list...');
        const response = await fetch('/api/music/list');
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        console.log('[DEBUG] Music list loaded:', data.music?.length || 0, 'songs');
        
        if (data.music && data.music.length > 0) {
          musicList.innerHTML = data.music.map(song => `
            <div class="music-item">
              <div class="music-item-info">
                <div class="music-item-title">${song.title}</div>
                <div class="music-item-artist">${song.artist}</div>
              </div>
              <div class="music-item-actions">
                <button class="btn-icon delete" onclick="deleteMusic('${song.id}')" title="删除">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                  </svg>
                </button>
              </div>
            </div>
          `).join('');
        } else {
          musicList.innerHTML = '<div class="empty-state">暂无音乐</div>';
        }
      } catch (error) {
        console.error('[ERROR] Failed to load music list:', error);
        musicList.innerHTML = '<div class="empty-state">加载失败: ' + error.message + '</div>';
      }
    }

    async function deleteMusic(id) {
      if (!confirm('确定要删除这首音乐吗？')) {
        return;
      }

      try {
        const response = await fetch(`/api/music/${id}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          showSuccess('音乐已删除');
          loadMusicList();
        } else {
          const data = await response.json();
          showError(data.error || '删除失败');
        }
      } catch (error) {
        showError('删除失败: ' + error.message);
      }
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
      setTimeout(() => {
        successMessage.style.display = 'none';
      }, 3000);
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
      setTimeout(() => {
        errorMessage.style.display = 'none';
      }, 5000);
    }

    loadMusicList();
  </script>
</body>
</html>
